<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>STEK 주문 시스템</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.ct{max-width:640px;margin:0 auto;padding:24px 16px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:28px;font-weight:700;letter-spacing:2px}
.logo p{font-size:13px;color:#888;margin-top:4px}
.fg{margin-bottom:20px}
.fg label{display:block;font-size:13px;color:#aaa;margin-bottom:6px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-size:15px;outline:none;transition:border .2s}
.fg input:focus,.fg textarea:focus{border-color:#c8a44e}
.fg textarea{resize:vertical;min-height:80px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.sw{position:relative}
.sr{position:absolute;top:100%;left:0;right:0;background:#1a1a1a;border:1px solid #333;border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:100;display:none}
.sr div{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #222}
.sr div:hover{background:#2a2a2a;color:#c8a44e}
.sr div mark{background:#c8a44e;color:#000;border-radius:2px;padding:0 2px}
.cart{background:#111;border:1px solid #333;border-radius:8px;padding:16px;margin-bottom:20px;min-height:60px}
.ce{color:#555;font-size:14px;text-align:center;padding:12px}
.ci{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #222}
.ci:last-child{border:none}
.ci .n{font-size:14px;flex:1}
.ci .q{display:flex;align-items:center;gap:8px}
.ci .q button{width:28px;height:28px;border-radius:50%;border:1px solid #555;background:transparent;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ci .q button:hover{border-color:#c8a44e;color:#c8a44e}
.ci .q span{min-width:24px;text-align:center;font-size:14px}
.ci .rm{color:#666;cursor:pointer;margin-left:12px;font-size:18px}
.ci .rm:hover{color:#e24b4a}
.btn{width:100%;padding:14px;background:#c8a44e;color:#000;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:1px}
.btn:hover{background:#d4b05a;transform:translateY(-1px)}
.btn:disabled{background:#555;cursor:not-allowed;transform:none}
.ok{text-align:center;padding:40px 20px;display:none}
.ok h2{color:#c8a44e;margin-bottom:12px}
.row{display:flex;gap:12px}
.row .fg{flex:1}
.badge{display:inline-block;background:#c8a44e;color:#000;font-size:11px;padding:2px 8px;border-radius:4px;margin-left:8px;font-weight:600}
</style>
</head>
<body>
<div class="ct">
<div class="logo"><h1>STEK</h1><p>제품 주문 시스템</p></div>
<div id="F">
<div class="fg"><label>업체명 *</label><input type="text" id="sn" placeholder="예) OO 오토필름"></div>
<div class="row">
<div class="fg"><label>담당자명 *</label><input type="text" id="cn" placeholder="이름"></div>
<div class="fg"><label>연락처 *</label><input type="tel" id="ph" placeholder="010-0000-0000" maxlength="13"></div>
</div>
<div class="fg"><label>제품 검색</label><div class="sw"><input type="text" id="ps" placeholder="검색... 예) NEX, DYNO, FORCE" autocomplete="off"><div class="sr" id="R"></div></div></div>
<div class="fg"><label>주문 목록 <span class="badge" id="cc">0</span></label><div class="cart" id="C"><div class="ce">위에서 제품을 검색하여 추가하세요</div></div></div>
<div class="fg"><label>희망 납품일</label><input type="date" id="dd"></div>
<div class="fg"><label>비고</label><textarea id="nt" placeholder="추가 요청사항 (선택)"></textarea></div>
<button class="btn" id="sb" onclick="go()">주문 접수</button>
</div>
<div id="ok" class="ok"><h2>주문이 접수되었습니다!</h2><p style="color:#aaa;margin-top:8px">빠르게 처리하겠습니다.</p><button class="btn" style="margin-top:24px" onclick="re()">새 주문</button></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init('JbyOriToRnvmEnzdu');</script>
<script>

let cart=[];
const ps=document.getElementById('ps'),R=document.getElementById('R');
ps.addEventListener('input',function(){
const q=this.value.trim().toLowerCase();
if(q.length<1){R.style.display='none';return}
const m=P.filter(p=>p.toLowerCase().includes(q)).slice(0,20);
if(!m.length){R.innerHTML='<div style="color:#666">검색 결과 없음</div>';R.style.display='block';return}
R.innerHTML=m.map(v=>{const i=v.toLowerCase().indexOf(q);return`<div onclick="add('${v.replace(/'/g,"\\'")}')">${v.substring(0,i)}<mark>${v.substring(i,i+q.length)}</mark>${v.substring(i+q.length)}</div>`}).join('');
R.style.display='block'});
document.addEventListener('click',e=>{if(!e.target.closest('.sw'))R.style.display='none'});
document.getElementById('ph').addEventListener('input',function(){
let v=this.value.replace(/[^0-9]/g,'');
if(v.length>3&&v.length<=7)v=v.slice(0,3)+'-'+v.slice(3);
else if(v.length>7)v=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
this.value=v});
(function(){const d=new Date();d.setDate(d.getDate()+1);document.getElementById('dd').value=d.toISOString().split('T')[0]})();
function add(n){const e=cart.find(c=>c.n===n);if(e)e.q++;else cart.push({n,q:1});ps.value='';R.style.display='none';render();ps.focus()}
function rm(i){cart.splice(i,1);render()}
function qty(i,d){cart[i].q=Math.max(1,cart[i].q+d);render()}
function render(){const el=document.getElementById('C');document.getElementById('cc').textContent=cart.length;
if(!cart.length){el.innerHTML='<div class="ce">위에서 제품을 검색하여 추가하세요</div>';return}
el.innerHTML=cart.map((c,i)=>`<div class="ci"><span class="n">${c.n}</span><div class="q"><button onclick="qty(${i},-1)">-</button><span>${c.q}</span><button onclick="qty(${i},1)">+</button></div><span class="rm" onclick="rm(${i})">x</span></div>`).join('')}
function go(){
const sn=document.getElementById('sn').value.trim(),cn=document.getElementById('cn').value.trim(),ph=document.getElementById('ph').value.trim(),dd=document.getElementById('dd').value,nt=document.getElementById('nt').value.trim();
if(!sn||!cn||!ph||!cart.length){alert('필수 항목을 입력하고 제품을 추가해주세요.');return}
const ol=cart.map(c=>c.n+' x '+c.q).join('\n');
const btn=document.getElementById('sb');btn.disabled=true;btn.textContent='접수 중...';
emailjs.send('service_pfqsqe3','template_vzx86tg',{shop_name:sn,contact_name:cn,phone:ph,delivery_date:dd,order_list:ol,notes:nt}).then(function(){document.getElementById('F').style.display='none';document.getElementById('ok').style.display='block'},function(err){alert('전송 실패: '+err.text);btn.disabled=false;btn.textContent='주문 접수'})}
function re(){cart=[];render();['sn','cn','ph','dd','nt'].forEach(id=>document.getElementById(id).value='');document.getElementById('F').style.display='block';document.getElementById('ok').style.display='none'}
</script>
</body>
</html>
